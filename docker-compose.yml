services:
  # Backend - Ruby on Rails API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gle-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RAILS_ENV=${RAILS_ENV}
    ports:
      - "${RAILS_PORT}:3005"
    volumes:
      - ./backend:/app
      - rails_bundle:/usr/local/bundle
    networks:
      - gle-network
    command: sh -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3005"

  # Frontend - Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gle-frontend
    restart: always
    env_file:
      - .env
    environment:
      - API_URL=${API_URL}
    ports:
      - "${ANGULAR_PORT}:4005"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - gle-network
    command: npm start

volumes:
  rails_bundle:
    driver: local

networks:
  gle-network:
    driver: bridge
